name: Clippy Check
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  clippy:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.5.0-devel-ubuntu22.04
      options: --user root
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y \
          curl \
          build-essential \
          pkg-config \
          libdbus-1-dev \
          libpipewire-0.3-dev \
          libavutil-dev \
          libavformat-dev \
          libavcodec-dev \
          libswscale-dev \
          libavdevice-dev \
          libavfilter-dev \
          libwayland-dev \
          libwayland-client0 \
          wayland-protocols \
          libssl-dev \
          libclang-dev
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
          
    - name: Verify CUDA installation
      run: |
        nvcc --version
        echo "CUDA_PATH=$CUDA_PATH"
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-clippy-
          ${{ runner.os }}-cargo-
          
    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
